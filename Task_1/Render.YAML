services:
  - type: worker
    name: kb-system
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in the Render dashboard — never commit real keys
      - key: ANONYMIZED_TELEMETRY
        value: "False"
    disk:
      name: kb-data
      mountPath: /app/data
      sizeGB: 1